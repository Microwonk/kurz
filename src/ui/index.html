<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kurz</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="layout">
    <header>
      <div class="logo">kurz<span class="cursor"></div>
      <a href="/logout" class="logout-btn">logout</a>
    </header>
    <div class="section-label">// new short url</div>
    <div class="card">
      <div class="field">
        <label for="long-url">destination url</label>
        <input id="long-url" type="url" placeholder="https://example.com/very/long/path" autocomplete="off">
      </div>
      <div class="field">
        <label>slug mode</label>
        <div class="radio-group">
          <input type="radio" name="mode" id="m-rs" value="random_string" checked>
          <label for="m-rs">random str</label>
          <input type="radio" name="mode" id="m-rw" value="random_words">
          <label for="m-rw">random words</label>
          <input type="radio" name="mode" id="m-cu" value="custom">
          <label for="m-cu">custom</label>
        </div>
        <div id="custom-field">
          <input id="custom-slug" type="text" placeholder="my-custom-slug">
        </div>
      </div>
      <button class="submit-btn" id="shorten-btn">shorten</button>
    </div>
    <div class="urls-header">
      <div class="section-label" style="margin:0">// links</div>
      <div id="url-count"></div>
    </div>
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="search..." autocomplete="off">
    </div>
    <div id="url-list"></div>
  </div>
  <div id="toast"></div>
  <script>
    const BASE = "{base_url}";
    let allUrls = [];

    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const cf = document.getElementById('custom-field');
        cf.classList.toggle('visible', radio.value === 'custom' && radio.checked);
      });
    });

    document.getElementById('search-input').addEventListener('input', () => {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const filtered = q
        ? allUrls.filter(u => u.slug.toLowerCase().includes(q) || u.original_url.toLowerCase().includes(q))
        : allUrls;
      renderUrls(filtered, q);
    });

    // Close any open menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.row-menu')) {
        document.querySelectorAll('.menu-dropdown.open').forEach(d => d.classList.remove('open'));
      }
    });

    let toastTimer;
    function toast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('error', isError);
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function loadUrls() {
      try {
        const res = await fetch('/api/urls');
        if (!res.ok) {
          throw new Error();
        }
        allUrls = await res.json();
      } catch {
        allUrls = [];
      }

      const q = document.getElementById('search-input').value.trim().toLowerCase();

      const filtered = q
        ? allUrls.filter(u => u.slug.toLowerCase().includes(q) || u.original_url.toLowerCase().includes(q))
        : allUrls;

      renderUrls(filtered, q);
    }

    function highlight(text, query) {
      if (!query) {
        return escHtml(text);
      }

      const idx = text.toLowerCase().indexOf(query);

      if (idx === -1) {
        return escHtml(text);
      }

      return escHtml(text.slice(0, idx))
        + `<mark>${escHtml(text.slice(idx, idx + query.length))}</mark>`
        + escHtml(text.slice(idx + query.length));
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderUrls(urls, query = '') {
      const container = document.getElementById('url-list');
      const count = document.getElementById('url-count');

      if (allUrls.length === 0) {
        count.textContent = '';
        container.innerHTML = '<div class="empty-state">no links yet - shorten one above</div>';
        return;
      }

      if (urls.length === 0) {
        count.textContent = `0 of ${allUrls.length}`;
        container.innerHTML = '<div class="empty-state">no links match your search</div>';
        return;
      }

      count.textContent = query
        ? `${urls.length} of ${allUrls.length} link${allUrls.length === 1 ? '' : 's'}`
        : `${urls.length} link${urls.length === 1 ? '' : 's'}`;

      container.innerHTML = urls.map(u => `
        <div class="url-row" data-slug="${escHtml(u.slug)}">
          <div class="slug-cell" title="${BASE}/${escHtml(u.slug)}">${highlight(u.slug, query)}</div>
          <div class="orig-cell" title="${escHtml(u.original_url)}">${highlight(u.original_url, query)}</div>
          <div class="hits-cell">${u.hit_count} hit${u.hit_count === 1 ? '' : 's'}</div>
          <div class="row-menu">
            <button class="menu-trigger" onclick="toggleMenu(this)">⋮</button>
            <div class="menu-dropdown">
              <button class="menu-item" onclick="copyUrl('${escHtml(u.slug)}'); closeMenus()">copy short url</button>
              <button class="menu-item" onclick="copyOrig('${escHtml(u.original_url)}'); closeMenus()">copy orig url</button>
              <button class="menu-item del" onclick="deleteUrl('${escHtml(u.slug)}'); closeMenus()">delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleMenu(btn) {
      const dropdown = btn.nextElementSibling;
      const isOpen = dropdown.classList.contains('open');
      document.querySelectorAll('.menu-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) {
        dropdown.classList.add('open');
      }
    }

    function closeMenus() {
      document.querySelectorAll('.menu-dropdown.open').forEach(d => d.classList.remove('open'));
    }

    document.getElementById('shorten-btn').addEventListener('click', async () => {
      const url = document.getElementById('long-url').value.trim();

      if (!url) {
        toast('enter a destination url', true);
        return;
      }

      const mode = document.querySelector('input[name="mode"]:checked').value;
      const custom = document.getElementById('custom-slug').value.trim();

      if (mode === 'custom' && !custom) {
        toast('enter a custom slug', true);
        return;
      }

      const btn = document.getElementById('shorten-btn');
      btn.disabled = true;

      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, mode, custom_slug: mode === 'custom' ? custom : null })
        });

        const data = await res.json();

        if (!res.ok) {
          toast(data.error || 'something went wrong', true);
        } else {
          document.getElementById('long-url').value = '';
          document.getElementById('custom-slug').value = '';
          await copyText(`${BASE}/${data.slug}`);
          toast(`created & copied: ${data.slug}`);
          loadUrls();
        }
      } catch (e) {
        toast(`request failed: ${e}`, true);
      } finally {
        btn.disabled = false;
      }
    });

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
    }
    async function copyUrl(slug) {
      await copyText(`${BASE}/${slug}`);
      toast(`copied: ${BASE}/${slug}`);
    }
    async function copyOrig(originalUrl) {
      await copyText(originalUrl);
      toast(`copied: ${originalUrl}`);
    }
    async function deleteUrl(slug) {
      if (!confirm(`delete /${slug}?`)) {
        return;
      }

      const res = await fetch(`/api/urls/${encodeURIComponent(slug)}`, { method: 'DELETE' });

      if (res.ok) {
        toast(`deleted: ${slug}`);
        loadUrls();
      } else {
        toast('delete failed', true);
      }
    }

    loadUrls();
  </script>
</body>
</html>
